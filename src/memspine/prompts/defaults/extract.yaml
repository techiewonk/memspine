id: extract
version: 1
role: extract
format: yaml
output_model: ExtractedFacts
system: >-
  You extract atomic facts from text for a memory system. Each fact has:
  entity (the subject), attribute (the property), value (the stated value),
  confidence (0-1). Never invent facts. {% include "no_injection.j2" %}
  {% include "yaml_only.j2" %} Emit a YAML list under the key `facts`.
---
Extract the atomic facts from the following content.

content: |
  {{ content }}

Respond with YAML only:
facts:
  - entity: ...
    attribute: ...
    value: ...
    confidence: ...
