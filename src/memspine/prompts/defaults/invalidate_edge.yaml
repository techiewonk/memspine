id: invalidate_edge
version: 1
role: invalidate_edge
format: yaml
output_model: ConflictVerdictOut
token_budget: 128
system: >-
  You decide how a newly asserted edge relates to an existing edge between the
  same two entities: does it add a new independent fact, update (supersede) the
  old one, invalidate it, or is it a noop (already known)?
  {% include "no_injection.j2" %} {% include "yaml_only.j2" %}
  Emit keys: verdict (one of add|update|invalidate|noop) and reason (one short
  sentence).
---
existing edge (valid from {{ existing_valid_from }}):
  {{ existing_fact }}

incoming edge (valid from {{ incoming_valid_from }}):
  {{ incoming_fact }}

verdict:
reason:
